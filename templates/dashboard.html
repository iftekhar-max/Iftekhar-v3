<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ড্যাশবোর্ড - ইফতেখার হোস্টিং</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .cyber-bg { background: linear-gradient(135deg, #0a0a0a 0%, #0a0515 50%, #0a0a2a 100%); }
        .console-bg { background: #0a0a1a; font-family: 'Courier New', monospace; }
        .terminal-text { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
        .file-hover:hover { background: rgba(255, 77, 77, 0.1); }
    </style>
</head>
<body class="cyber-bg text-white">
    <nav class="bg-black bg-opacity-50 backdrop-blur-lg border-b border-red-500 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <i class="fas fa-robot text-red-500 text-2xl"></i>
                <span class="text-xl font-bold ml-2">ইফতেখার হোস্টিং</span>
            </div>
            <div class="flex items-center gap-4">
                <span><i class="fas fa-user"></i> <span id="username">{{ username }}</span></span>
                <a href="/file-manager" class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-700">
                    <i class="fas fa-folder"></i> ফাইল ম্যানেজার
                </a>
                <a href="/logout" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700">
                    <i class="fas fa-sign-out-alt"></i> লগআউট
                </a>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto px-4 py-8">
        <!-- সিস্টেম স্ট্যাটাস -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-gray-800 bg-opacity-50 rounded-lg p-4 border border-red-500">
                <i class="fas fa-microchip text-red-500"></i> CPU লোড: <span id="cpu">0</span>%
                <div class="w-full bg-gray-700 rounded-full h-2 mt-2"><div id="cpuBar" class="bg-red-500 h-2 rounded-full" style="width:0%"></div></div>
            </div>
            <div class="bg-gray-800 bg-opacity-50 rounded-lg p-4 border border-blue-500">
                <i class="fas fa-memory text-blue-500"></i> RAM লোড: <span id="ram">0</span>%
                <div class="w-full bg-gray-700 rounded-full h-2 mt-2"><div id="ramBar" class="bg-blue-500 h-2 rounded-full" style="width:0%"></div></div>
            </div>
            <div class="bg-gray-800 bg-opacity-50 rounded-lg p-4 border border-green-500">
                <i class="fas fa-hdd text-green-500"></i> ডিস্ক: <span id="disk">0</span>%
                <div class="w-full bg-gray-700 rounded-full h-2 mt-2"><div id="diskBar" class="bg-green-500 h-2 rounded-full" style="width:0%"></div></div>
            </div>
        </div>
        
        <!-- কনসোল আউটপুট -->
        <div class="bg-black bg-opacity-80 rounded-lg border border-red-500 mb-6">
            <div class="border-b border-red-500 p-3 flex justify-between">
                <span><i class="fas fa-terminal"></i> কনসোল আউটপুট</span>
                <button onclick="clearConsole()" class="text-sm bg-gray-700 px-3 py-1 rounded hover:bg-gray-600">
                    <i class="fas fa-trash"></i> ক্লিয়ার
                </button>
            </div>
            <div id="console" class="p-4 h-64 overflow-y-auto console-bg text-sm"></div>
        </div>
        
        <!-- কোড কন্ট্রোল -->
        <div class="bg-gray-800 bg-opacity-50 rounded-lg p-6 border border-blue-500">
            <h3 class="text-xl font-bold mb-4"><i class="fas fa-play-circle"></i> কোড রান কন্ট্রোল</h3>
            <div class="flex gap-4 flex-wrap">
                <select id="fileSelect" class="bg-gray-900 border border-blue-500 rounded-lg px-4 py-2 flex-1">
                    <option value="">পাইথন ফাইল সিলেক্ট করুন</option>
                </select>
                <button onclick="runCode()" class="bg-green-600 px-6 py-2 rounded-lg hover:bg-green-700">
                    <i class="fas fa-play"></i> রান করুন
                </button>
                <button onclick="stopCode()" class="bg-red-600 px-6 py-2 rounded-lg hover:bg-red-700">
                    <i class="fas fa-stop"></i> স্টপ করুন
                </button>
            </div>
        </div>
    </div>
    
    <script>
        const socket = io();
        let consoleLines = [];
        
        function addToConsole(text, type = 'info') {
            const colors = {info: '#aaa', success: '#0f0', error: '#f00', warning: '#ff0'};
            const consoleDiv = document.getElementById('console');
            const line = document.createElement('div');
            line.style.color = colors[type] || colors.info;
            line.style.borderLeft = `3px solid ${colors[type] || colors.info}`;
            line.style.paddingLeft = '10px';
            line.style.marginBottom = '5px';
            line.innerHTML = `<span class="text-gray-500">[${new Date().toLocaleTimeString()}]</span> ${text}`;
            consoleDiv.appendChild(line);
            line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function clearConsole() {
            document.getElementById('console').innerHTML = '';
            addToConsole('কনসোল ক্লিয়ার করা হয়েছে', 'warning');
        }
        
        async function loadFiles() {
            const response = await fetch('/api/files');
            const files = await response.json();
            const select = document.getElementById('fileSelect');
            select.innerHTML = '<option value="">পাইথন ফাইল সিলেক্ট করুন</option>';
            files.forEach(file => {
                if(file.name.endsWith('.py')) {
                    const option = document.createElement('option');
                    option.value = file.name;
                    option.textContent = file.name;
                    select.appendChild(option);
                }
            });
        }
        
        async function runCode() {
            const filename = document.getElementById('fileSelect').value;
            if(!filename) {
                addToConsole('প্লিজ একটি পাইথন ফাইল সিলেক্ট করুন!', 'error');
                return;
            }
            
            addToConsole(`🚀 "${filename}" রান হচ্ছে...`, 'success');
            const response = await fetch('/api/run', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({filename})
            });
            
            const data = await response.json();
            if(!data.success) {
                addToConsole(`ERROR: ${data.error}`, 'error');
            }
        }
        
        async function stopCode() {
            const response = await fetch('/api/stop', {method: 'POST'});
            const data = await response.json();
            addToConsole(data.message || 'কোড বন্ধ করা হয়েছে', 'warning');
        }
        
        async function updateStats() {
            const response = await fetch('/api/system-stats');
            const stats = await response.json();
            document.getElementById('cpu').textContent = stats.cpu;
            document.getElementById('ram').textContent = stats.memory;
            document.getElementById('disk').textContent = stats.disk;
            document.getElementById('cpuBar').style.width = stats.cpu + '%';
            document.getElementById('ramBar').style.width = stats.memory + '%';
            document.getElementById('diskBar').style.width = stats.disk + '%';
        }
        
        socket.on('run_result', (data) => {
            if(data.result.output) {
                addToConsole(data.result.output, 'success');
            }
            if(data.result.error) {
                addToConsole(data.result.error, 'error');
            }
            addToConsole(`রান সম্পন্ন - রিটার্ন কোড: ${data.result.return_code}`, 'info');
        });
        
        loadFiles();
        updateStats();
        setInterval(updateStats, 3000);
        addToConsole('ইফতেখার হোস্টিং বোর্ড অনলাইন ✅', 'success');
    </script>
</body>
</html>
