<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইফতেখার হোস্টিং বোর্ড | ফাইল ম্যানেজার</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0a0a0a 0%, #0a0515 50%, #0a0a2a 100%); min-height: 100vh; color: #fff; overflow-x: hidden; }
        .bg-animation { position: fixed; width: 100%; height: 100%; z-index: 0; overflow: hidden; }
        .particle { position: absolute; width: 2px; height: 2px; background: linear-gradient(135deg, #ff4d4d, #4d4dff); border-radius: 50%; animation: floatParticle 10s infinite linear; }
        @keyframes floatParticle { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-100vh) scale(1); opacity: 0; } }
        .container { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; padding: 20px; }
        .welcome-section { text-align: center; padding: 30px 20px; background: rgba(15, 20, 45, 0.4); backdrop-filter: blur(10px); border-radius: 30px; margin-bottom: 30px; border: 1px solid rgba(255, 77, 77, 0.3); animation: slideDown 0.8s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }
        .welcome-section h1 { font-family: 'Orbitron', monospace; font-size: 38px; background: linear-gradient(135deg, #ff4d4d, #4d4dff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-badge { display: inline-block; margin-top: 15px; padding: 8px 20px; background: rgba(255, 77, 77, 0.2); border-radius: 50px; font-size: 14px; }
        .control-section { display: flex; justify-content: center; gap: 25px; margin-bottom: 30px; flex-wrap: wrap; }
        .ctrl-btn { padding: 12px 35px; font-size: 16px; font-weight: 600; font-family: 'Orbitron', monospace; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 10px; }
        .btn-start { background: linear-gradient(135deg, #00cc44, #009933); }
        .btn-stop { background: linear-gradient(135deg, #ff4444, #cc0000); }
        .btn-restart { background: linear-gradient(135deg, #ffaa00, #ff6600); }
        .ctrl-btn:hover { transform: scale(1.05); }
        .server-status { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-bottom: 30px; padding: 15px; background: rgba(0, 0, 0, 0.4); border-radius: 15px; }
        .status-indicator { display: flex; align-items: center; gap: 10px; padding: 8px 20px; background: rgba(255,255,255,0.05); border-radius: 50px; }
        .status-led { width: 12px; height: 12px; border-radius: 50%; }
        .status-led.online { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .status-led.offline { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .console-section { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 77, 77, 0.3); margin-bottom: 30px; }
        .console-header { background: linear-gradient(135deg, rgba(255, 77, 77, 0.2), rgba(77, 77, 255, 0.2)); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 77, 77, 0.3); flex-wrap: wrap; }
        .console-title { font-family: 'Orbitron', monospace; font-size: 18px; }
        .console-body { height: 200px; overflow-y: auto; padding: 20px; font-family: 'Courier New', monospace; font-size: 13px; }
        .log-entry { padding: 6px 12px; margin-bottom: 6px; border-left: 3px solid; animation: slideIn 0.3s ease; }
        .log-info { border-left-color: #4d4dff; color: #aaa; }
        .log-success { border-left-color: #00ff00; color: #00ff00; }
        .log-warning { border-left-color: #ffaa00; color: #ffaa00; }
        .log-error { border-left-color: #ff4444; color: #ff4444; }
        .log-time { color: #888; margin-right: 15px; font-size: 11px; }
        .file-manager { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(77, 77, 255, 0.3); overflow: hidden; }
        .file-header { background: linear-gradient(135deg, rgba(77, 77, 255, 0.2), rgba(255, 77, 77, 0.2)); padding: 15px 25px; border-bottom: 1px solid rgba(77, 77, 255, 0.3); }
        .upload-area { border: 2px dashed rgba(255, 77, 77, 0.5); border-radius: 15px; padding: 30px; margin: 20px; text-align: center; cursor: pointer; transition: all 0.3s; background: rgba(255,255,255,0.02); }
        .upload-area:hover { border-color: #ff4d4d; background: rgba(255, 77, 77, 0.1); }
        .upload-area.drag-over { border-color: #4d4dff; background: rgba(77, 77, 255, 0.2); }
        .file-tree { padding: 20px; max-height: 500px; overflow-y: auto; }
        .folder-item, .file-item-tree { margin-left: 20px; margin-top: 5px; }
        .folder-toggle { cursor: pointer; user-select: none; padding: 8px 10px; border-radius: 8px; transition: all 0.3s; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); margin-bottom: 5px; }
        .folder-toggle:hover { background: rgba(255, 77, 77, 0.2); }
        .folder-children { display: none; margin-left: 25px; }
        .folder-children.open { display: block; }
        .file-item-tree { padding: 8px 10px; border-radius: 8px; background: rgba(255,255,255,0.03); margin-bottom: 5px; transition: all 0.3s; border-left: 2px solid #ff4d4d; }
        .file-item-tree:hover { background: rgba(255,255,255,0.1); }
        .file-item-tree.main-file { border-left: 2px solid #00ff00; background: rgba(0, 255, 0, 0.1); }
        .file-content-area { margin-top: 8px; }
        .file-content-textarea { width: 100%; background: #0a0a1a; border: 1px solid rgba(255,77,77,0.3); color: #fff; padding: 10px; font-family: monospace; font-size: 12px; border-radius: 8px; resize: vertical; display: none; }
        .file-content-textarea.show { display: block; }
        .file-info-tree { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
        .file-name-tree { font-size: 13px; }
        .file-size { font-size: 10px; color: #aaa; margin-left: 8px; }
        .file-actions-tree { display: flex; gap: 8px; }
        .file-actions-tree button { background: rgba(255,255,255,0.1); border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; color: white; font-size: 11px; transition: all 0.3s; }
        .edit-btn { background: rgba(77, 77, 255, 0.3); }
        .edit-btn:hover { background: rgba(77, 77, 255, 0.7); }
        .save-btn { background: rgba(0, 204, 68, 0.3); }
        .save-btn:hover { background: rgba(0, 204, 68, 0.7); }
        .set-main-btn { background: rgba(0, 255, 0, 0.2); }
        .set-main-btn:hover { background: rgba(0, 255, 0, 0.5); }
        .delete-btn { background: rgba(255, 68, 68, 0.2); }
        .delete-btn:hover { background: rgba(255, 68, 68, 0.5); }
        .main-badge { background: #00ff00; color: #000; padding: 2px 6px; border-radius: 20px; font-size: 9px; font-weight: bold; margin-left: 8px; }
        .logout-btn { position: fixed; top: 20px; right: 20px; background: rgba(255, 77, 77, 0.2); border: 1px solid rgba(255, 77, 77, 0.5); padding: 10px 20px; border-radius: 50px; color: white; cursor: pointer; z-index: 100; font-family: 'Orbitron', monospace; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #ff4d4d, #4d4dff); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> লগআউট</button>

    <div class="container">
        <div class="welcome-section">
            <h1><i class="fas fa-server"></i> ইফতেখার হোস্টিং বোর্ড</h1>
            <div style="font-size: 18px; margin-top: 10px;">তোমাদেরকে স্বাগতম! 🚀</div>
            <div class="user-badge"><i class="fas fa-user"></i> <span id="username">ভিজিটর</span></div>
        </div>

        <div class="control-section">
            <button class="ctrl-btn btn-start" id="startBtn"><i class="fas fa-play"></i> স্টার্ট</button>
            <button class="ctrl-btn btn-stop" id="stopBtn"><i class="fas fa-stop"></i> স্টপ</button>
            <button class="ctrl-btn btn-restart" id="restartBtn"><i class="fas fa-sync-alt"></i> রিস্টার্ট</button>
        </div>

        <div class="server-status">
            <div class="status-indicator">
                <div class="status-led online" id="statusLed"></div>
                <span id="serverStatusText">সার্ভার অনলাইন</span>
            </div>
            <div class="status-indicator"><i class="fas fa-microchip"></i> CPU: <span id="cpuLoad">0</span>%</div>
            <div class="status-indicator"><i class="fas fa-memory"></i> RAM: <span id="ramLoad">0</span>%</div>
        </div>

        <div class="console-section">
            <div class="console-header">
                <div class="console-title"><i class="fas fa-terminal"></i> লাইভ কনসোল লগ</div>
                <div><button onclick="clearConsole()" style="background:rgba(255,255,255,0.1); border:none; padding:5px 12px; border-radius:5px; color:white; cursor:pointer;"><i class="fas fa-trash"></i> ক্লিয়ার</button></div>
            </div>
            <div class="console-body" id="consoleBody"></div>
        </div>

        <div class="file-manager">
            <div class="file-header">
                <h3><i class="fas fa-folder-tree"></i> ফাইল ম্যানেজার</h3>
                <p style="font-size: 12px; color: #aaa;">ZIP ফাইল আপলোড করুন | ফাইল এডিট করুন → সেভ বাটনে ক্লিক করুন</p>
            </div>
            
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt" style="font-size: 48px; margin-bottom: 10px;"></i>
                <p><strong>ক্লিক করুন বা ড্র্যাগ করুন</strong></p>
                <p style="font-size: 12px;">ZIP ফাইল আপলোড সাপোর্ট (ফোল্ডার স্ট্রাকচার সংরক্ষিত থাকবে)</p>
                <input type="file" id="fileInput" accept=".zip" style="display: none;">
            </div>

            <div class="file-tree" id="fileTree"></div>
        </div>
    </div>

    <script>
        // ব্যাকএন্ড কানেকশন শুরু
        const socket = io();
        let fileSystem = {};
        let mainFilePath = null;

        // ব্যাকএন্ড থেকে লাইভ স্ট্যাটাস আপডেট
        socket.on('status_update', (data) => {
            document.getElementById('serverStatusText').textContent = data.status_text;
            document.getElementById('statusLed').className = `status-led ${data.running ? 'online' : 'offline'}`;
            document.getElementById('cpuLoad').textContent = data.cpu;
            document.getElementById('ramLoad').textContent = data.ram;
        });

        // ব্যাকএন্ড থেকে লাইভ লগ
        socket.on('new_log', (data) => {
            addLog(data.message, data.type);
        });

        // কন্ট্রোল বাটন ইভেন্ট
        document.getElementById('startBtn').onclick = () => socket.emit('server_control', {action: 'start'});
        document.getElementById('stopBtn').onclick = () => socket.emit('server_control', {action: 'stop'});
        document.getElementById('restartBtn').onclick = () => socket.emit('server_control', {action: 'restart'});

        function addLog(message, type = 'info') {
            const consoleBody = document.getElementById('consoleBody');
            const logDiv = document.createElement('div');
            const now = new Date();
            const timeStr = now.toLocaleTimeString('bn-BD');
            logDiv.className = `log-entry log-${type}`;
            logDiv.innerHTML = `<span class="log-time">[${timeStr}]</span> ${message}`;
            consoleBody.appendChild(logDiv);
            logDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function clearConsole() {
            document.getElementById('consoleBody').innerHTML = '';
        }

        // ফাইল আপলোড হ্যান্ডলার (ব্যাকএন্ড API-তে ফাইল পাঠানো)
        async function handleFiles(files) {
            const file = files[0];
            if(!file || !file.name.endsWith('.zip')) {
                addLog('শুধুমাত্র ZIP ফাইল সাপোর্ট করে!', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                addLog(`ZIP ফাইল আপলোড হচ্ছে...`, 'warning');
                const response = await fetch('/api/upload', { method: 'POST', body: formData });
                if(response.ok) {
                    // ফ্রন্টএন্ডে জিপ প্রসেসিং ট্র্রি রেন্ডার
                    processZipFile(file);
                }
            } catch(e) {
                addLog('আপলোড ব্যর্থ হয়েছে!', 'error');
            }
        }

        // ইনলাইন এডিট সেভ করা (ব্যাকএন্ডে ডাটা পাঠানো)
        async function saveFileContent(uniqueId, filePath) {
            const textarea = document.getElementById(`textarea_${uniqueId}`);
            const newContent = textarea.value;
            const file = getFileByPath(filePath);
            
            if(file) {
                try {
                    const response = await fetch('/api/files', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({path: filePath, content: newContent})
                    });
                    
                    if(response.ok) {
                        file.content = newContent;
                        file.size = formatFileSize(newContent.length);
                        textarea.style.display = 'none';
                        document.getElementById(`save_${uniqueId}`).style.display = 'none';
                        renderFileTree();
                        showNotification(`✅ সেভ হয়েছে!`, 'success');
                    }
                } catch(e) {
                    addLog('ফাইল সেভ করা যায়নি', 'error');
                }
            }
        }

        // ফাইল ডিলিট করা (ব্যাকএন্ডে রিকোয়েস্ট পাঠানো)
        async function deleteFile(path) {
            try {
                const response = await fetch(`/api/files?path=${encodeURIComponent(path)}`, { method: 'DELETE' });
                if(response.ok) {
                    const file = getFileByPath(path);
                    const parts = path.split('/');
                    let current = fileSystem;
                    for(let i = 0; i < parts.length - 1; i++) { current = current[parts[i]].children; }
                    delete current[parts[parts.length - 1]];
                    if(mainFilePath === path) mainFilePath = null;
                    renderFileTree();
                }
            } catch(e) {
                addLog('ডিলিট ব্যর্থ হয়েছে', 'error');
            }
        }

        // জিপ এক্সট্র্যাক্ট রিড লজিক (যা আপনার ফাইলে ছিল)
        async function processZipFile(zipFile) {
            try {
                const zip = await JSZip.loadAsync(zipFile);
                for (const [filename, fileData] of Object.entries(zip.files)) {
                    if (!fileData.dir) {
                        const content = await fileData.async('string');
                        const blob = await fileData.async('blob');
                        addFileToSystem(filename, content, formatFileSize(blob.size));
                    }
                }
                renderFileTree();
            } catch (error) {}
        }

        function addFileToSystem(filePath, content, size) {
            const parts = filePath.split('/');
            let current = fileSystem;
            let currentPath = '';
            for(let i = 0; i < parts.length - 1; i++) {
                currentPath += (currentPath ? '/' : '') + parts[i];
                if(!current[parts[i]]) {
                    current[parts[i]] = { type: 'folder', name: parts[i], path: currentPath, children: {}, fileCount: 0 };
                }
                current = current[parts[i]].children;
            }
            const fileName = parts[parts.length - 1];
            current[fileName] = { type: 'file', name: fileName, path: filePath, content: content, size: size };
        }

        function getFileByPath(path) {
            const parts = path.split('/');
            let current = fileSystem;
            for(let i = 0; i < parts.length; i++) {
                if(current[parts[i]]) {
                    if(i === parts.length - 1 && current[parts[i]].type === 'file') return current[parts[i]];
                    current = current[parts[i]].children;
                } else return null;
            }
            return null;
        }

        function renderFileTree() {
            const treeContainer = document.getElementById('fileTree');
            if(Object.keys(fileSystem).length === 0) {
                treeContainer.innerHTML = '<div style="text-align: center; color: #aaa; padding: 20px;"><i class="fas fa-inbox"></i> এখনো কোন ফাইল আপলোড হয়নি</div>';
                return;
            }
            treeContainer.innerHTML = '';
            const root = document.createElement('div');
            root.className = 'folder-item';
            
            function renderNode(node, nodeName, container) {
                if(node.type === 'file') {
                    const fileDiv = document.createElement('div');
                    const uniqueId = 'file_' + node.path.replace(/[\/.]/g, '_');
                    fileDiv.className = `file-item-tree ${mainFilePath === node.path ? 'main-file' : ''}`;
                    fileDiv.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                            <div class="file-info-tree" onclick="toggleFileContent('${uniqueId}')">
                                <i class="fas fa-file-code"></i>
                                <div class="file-name-tree">${node.name} ${mainFilePath === node.path ? '<span class="main-badge">★ মেইন</span>' : ''} <span class="file-size">(${node.size})</span></div>
                            </div>
                            <div class="file-actions-tree">
                                <button class="edit-btn" onclick="enableEdit('${uniqueId}', '${node.path}')">এডিট</button>
                                <button class="set-main-btn" onclick="setMainFile('${node.path}')">মেইন</button>
                                <button class="delete-btn" onclick="deleteFile('${node.path}')">ডিলিট</button>
                            </div>
                        </div>
                        <div class="file-content-area">
                            <textarea id="textarea_${uniqueId}" class="file-content-textarea"></textarea>
                            <div style="display: flex; justify-content: flex-end; margin-top: 8px;">
                                <button class="save-btn" onclick="saveFileContent('${uniqueId}', '${node.path}')" style="display: none;" id="save_${uniqueId}"><i class="fas fa-save"></i> সেভ করুন</button>
                            </div>
                        </div>`;
                    container.appendChild(fileDiv);
                } else {
                    const folderDiv = document.createElement('div');
                    folderDiv.className = 'folder-item';
                    folderDiv.innerHTML = `<div class="folder-toggle">📁 <strong>${node.name}</strong></div>`;
                    const childrenDiv = document.createElement('div');
                    childrenDiv.className = 'folder-children open';
                    for(const [cName, cNode] of Object.entries(node.children)) { renderNode(cNode, cName, childrenDiv); }
                    folderDiv.appendChild(childrenDiv);
                    container.appendChild(folderDiv);
                }
            }
            for(const [name, node] of Object.entries(fileSystem)) { renderNode(node, name, root); }
            treeContainer.appendChild(root);
        }

        function toggleFileContent(id) {
            const t = document.getElementById(`textarea_${id}`);
            const s = document.getElementById(`save_${id}`);
            if(t.style.display === 'none' || !t.style.display) { t.style.display = 'block'; if(s) s.style.display = 'inline-flex'; }
            else { t.style.display = 'none'; if(s) s.style.display = 'none'; }
        }

        function enableEdit(id, path) {
            const f = getFileByPath(path);
            if(f) {
                const t = document.getElementById(`textarea_${id}`);
                t.value = f.content; t.style.display = 'block';
                document.getElementById(`save_${id}`).style.display = 'inline-flex';
            }
        }

        function setMainFile(path) { mainFilePath = path; renderFileTree(); }
        function formatFileSize(b) { return b < 1024 ? b + ' B' : (b / 1024).toFixed(2) + ' KB'; }
        function logout() { localStorage.removeItem('currentUser'); window.location.href = '#'; }

        function showNotification(msg, type) {
            const n = document.createElement('div');
            n.style.cssText = `position: fixed; bottom: 20px; right: 20px; background: rgba(0, 204, 68, 0.95); color: white; padding: 12px 24px; border-radius: 12px; z-index: 2000;`;
            n.innerHTML = msg; document.body.appendChild(n); setTimeout(() => n.remove(), 3000);
        }

        // ড্র্যাগ অ্যান্ড ড্রপ
        const uploadArea = document.getElementById('uploadArea');
        uploadArea.onclick = () => document.getElementById('fileInput').click();
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
        uploadArea.addEventListener('drop', (e) => { e.preventDefault(); uploadArea.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
        document.getElementById('fileInput').addEventListener('change', (e) => handleFiles(e.target.files));
        
        renderFileTree();
    </script>
</body>
    </html>
