<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ড্যাশবোর্ড - ইফতেখার হোস্টিং</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .cyber-bg { background: linear-gradient(135deg, #0a0a0a 0%, #0a0515 50%, #0a0a2a 100%); }
        .console-bg { background: #0a0a1a; font-family: 'Courier New', monospace; }
        select option { background: #1a1a2a; color: white; }
    </style>
</head>
<body class="cyber-bg text-white">
    <nav class="bg-black bg-opacity-50 backdrop-blur-lg border-b border-red-500 p-4">
        <div class="container mx-auto flex justify-between items-center flex-wrap gap-4">
            <div>
                <i class="fas fa-robot text-red-500 text-2xl"></i>
                <span class="text-xl font-bold ml-2">ইফতেখার হোস্টিং</span>
            </div>
            <div class="flex items-center gap-4 flex-wrap">
                <span><i class="fas fa-user"></i> <span id="username">{{ username }}</span></span>
                <a href="/file-manager" class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    <i class="fas fa-folder"></i> ফাইল ম্যানেজার
                </a>
                <a href="/logout" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700 transition">
                    <i class="fas fa-sign-out-alt"></i> লগআউট
                </a>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto px-4 py-8">
        <!-- সিস্টেম স্ট্যাটাস -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-gray-800 bg-opacity-50 rounded-lg p-4 border border-red-500">
                <i class="fas fa-microchip text-red-500"></i> CPU লোড: <span id="cpu">0</span>%
                <div class="w-full bg-gray-700 rounded-full h-2 mt-2"><div id="cpuBar" class="bg-red-500 h-2 rounded-full" style="width:0%"></div></div>
            </div>
            <div class="bg-gray-800 bg-opacity-50 rounded-lg p-4 border border-blue-500">
                <i class="fas fa-memory text-blue-500"></i> RAM লোড: <span id="ram">0</span>%
                <div class="w-full bg-gray-700 rounded-full h-2 mt-2"><div id="ramBar" class="bg-blue-500 h-2 rounded-full" style="width:0%"></div></div>
            </div>
            <div class="bg-gray-800 bg-opacity-50 rounded-lg p-4 border border-green-500">
                <i class="fas fa-hdd text-green-500"></i> ডিস্ক: <span id="disk">0</span>%
                <div class="w-full bg-gray-700 rounded-full h-2 mt-2"><div id="diskBar" class="bg-green-500 h-2 rounded-full" style="width:0%"></div></div>
            </div>
        </div>
        
        <!-- কনসোল আউটপুট -->
        <div class="bg-black bg-opacity-80 rounded-lg border border-red-500 mb-6">
            <div class="border-b border-red-500 p-3 flex justify-between flex-wrap gap-2">
                <span><i class="fas fa-terminal"></i> কনসোল আউটপুট</span>
                <div class="flex gap-2">
                    <button onclick="clearConsole()" class="text-sm bg-gray-700 px-3 py-1 rounded hover:bg-gray-600">
                        <i class="fas fa-trash"></i> ক্লিয়ার
                    </button>
                    <button onclick="installMissingModules()" class="text-sm bg-yellow-600 px-3 py-1 rounded hover:bg-yellow-700">
                        <i class="fas fa-download"></i> মডিউল ইন্সটল
                    </button>
                </div>
            </div>
            <div id="console" class="p-4 h-64 overflow-y-auto console-bg text-sm"></div>
        </div>
        
        <!-- কোড কন্ট্রোল -->
        <div class="bg-gray-800 bg-opacity-50 rounded-lg p-6 border border-blue-500">
            <h3 class="text-xl font-bold mb-4"><i class="fas fa-play-circle"></i> কোড রান কন্ট্রোল</h3>
            <div class="flex gap-4 flex-wrap">
                <select id="fileSelect" class="bg-gray-900 border border-blue-500 rounded-lg px-4 py-2 flex-1 focus:outline-none focus:border-green-500" onchange="onFileSelect(this.value)">
                    <option value="">-- পাইথন ফাইল সিলেক্ট করুন --</option>
                </select>
                <button id="runBtn" onclick="runCode()" class="bg-green-600 px-6 py-2 rounded-lg hover:bg-green-700 transition">
                    <i class="fas fa-play"></i> রান করুন
                </button>
                <button id="stopBtn" onclick="stopCode()" class="bg-red-600 px-6 py-2 rounded-lg hover:bg-red-700 transition">
                    <i class="fas fa-stop"></i> স্টপ করুন
                </button>
            </div>
            <div id="selectedFileInfo" class="mt-3 text-sm text-gray-400"></div>
        </div>
    </div>
    
    <script>
        const socket = io();
        let currentSelectedFile = '';
        
        function addToConsole(text, type = 'info') {
            const colors = {info: '#aaa', success: '#0f0', error: '#f00', warning: '#ff0'};
            const consoleDiv = document.getElementById('console');
            const line = document.createElement('div');
            line.style.color = colors[type] || colors.info;
            line.style.borderLeft = `3px solid ${colors[type] || colors.info}`;
            line.style.padding = '8px';
            line.style.margin = '4px 0';
            line.style.borderRadius = '4px';
            line.innerHTML = `<span class="text-gray-500">[${new Date().toLocaleTimeString()}]</span> ${text}`;
            consoleDiv.appendChild(line);
            line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function clearConsole() {
            document.getElementById('console').innerHTML = '';
            addToConsole('কনসোল ক্লিয়ার করা হয়েছে', 'warning');
        }
        
        async function loadFiles() {
            try {
                const response = await fetch('/api/files');
                const files = await response.json();
                const select = document.getElementById('fileSelect');
                const currentValue = select.value;
                
                select.innerHTML = '<option value="">-- পাইথন ফাইল সিলেক্ট করুন --</option>';
                
                const pythonFiles = files.filter(f => f.type === 'file' && f.name.endsWith('.py'));
                
                if(pythonFiles.length === 0) {
                    select.innerHTML = '<option value="">❌ কোন পাইথন ফাইল নেই</option>';
                    document.getElementById('selectedFileInfo').innerHTML = '';
                } else {
                    pythonFiles.forEach(file => {
                        const option = document.createElement('option');
                        option.value = file.name;
                        option.textContent = `${file.name} (${formatFileSize(file.size)})`;
                        select.appendChild(option);
                    });
                    
                    // আগের সিলেক্টেড ভ্যালু রিস্টোর
                    if(currentValue && pythonFiles.find(f => f.name === currentValue)) {
                        select.value = currentValue;
                        currentSelectedFile = currentValue;
                        document.getElementById('selectedFileInfo').innerHTML = `✅ সিলেক্টেড: ${currentValue}`;
                    }
                }
            } catch (error) {
                console.error('File load error:', error);
                addToConsole('ফাইল লোড করতে ব্যর্থ!', 'error');
            }
        }
        
        function formatFileSize(bytes) {
            if(bytes < 1024) return bytes + ' B';
            if(bytes < 1048576) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / 1048576).toFixed(2) + ' MB';
        }
        
        function onFileSelect(value) {
            if(value) {
                currentSelectedFile = value;
                document.getElementById('selectedFileInfo').innerHTML = `✅ সিলেক্টেড ফাইল: ${value}`;
                addToConsole(`📁 ফাইল সিলেক্ট করা হয়েছে: ${value}`, 'success');
            } else {
                currentSelectedFile = '';
                document.getElementById('selectedFileInfo').innerHTML = '';
            }
        }
        
        async function runCode() {
            const filename = document.getElementById('fileSelect').value;
            if(!filename) {
                addToConsole('❌ প্লিজ একটি পাইথন ফাইল সিলেক্ট করুন!', 'error');
                return;
            }
            
            const runBtn = document.getElementById('runBtn');
            runBtn.disabled = true;
            runBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> রান হচ্ছে...';
            
            addToConsole(`🚀 "${filename}" রান শুরু হচ্ছে...`, 'success');
            
            try {
                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({filename: filename})
                });
                
                const data = await response.json();
                if(!data.success && data.error) {
                    addToConsole(`❌ ERROR: ${data.error}`, 'error');
                }
            } catch (error) {
                addToConsole(`❌ ERROR: ${error.message}`, 'error');
            } finally {
                runBtn.disabled = false;
                runBtn.innerHTML = '<i class="fas fa-play"></i> রান করুন';
            }
        }
        
        async function stopCode() {
            try {
                const response = await fetch('/api/stop', {method: 'POST'});
                const data = await response.json();
                addToConsole(data.message || '⏹️ কোড বন্ধ করা হয়েছে', 'warning');
            } catch (error) {
                addToConsole('স্টপ করতে ব্যর্থ: ' + error.message, 'error');
            }
        }
        
        async function updateStats() {
            try {
                const response = await fetch('/api/system-stats');
                const stats = await response.json();
                document.getElementById('cpu').textContent = stats.cpu;
                document.getElementById('ram').textContent = stats.memory;
                document.getElementById('disk').textContent = stats.disk;
                document.getElementById('cpuBar').style.width = stats.cpu + '%';
                document.getElementById('ramBar').style.width = stats.memory + '%';
                document.getElementById('diskBar').style.width = stats.disk + '%';
            } catch (error) {}
        }
        
        async function installMissingModules() {
            addToConsole('📦 মডিউল ইন্সটল করা হচ্ছে...', 'warning');
            addToConsole('💡 টিপ: Railway তে নিচের মডিউলগুলো requirements.txt এ যোগ করুন:', 'info');
            addToConsole('   requests, psutil, jwt, urllib3, aiohttp, pytz', 'info');
            addToConsole('🔧 অথবা ফাইল ম্যানেজারে গিয়ে কোড থেকে ইম্পোর্ট সরিয়ে দিন', 'warning');
        }
        
        socket.on('run_result', (data) => {
            if(data.result.output) {
                const lines = data.result.output.split('\n');
                lines.forEach(line => {
                    if(line.trim()) addToConsole(line, 'success');
                });
            }
            if(data.result.error) {
                const lines = data.result.error.split('\n');
                lines.forEach(line => {
                    if(line.trim()) addToConsole(line, 'error');
                });
            }
            addToConsole(`✅ রান সম্পন্ন - রিটার্ন কোড: ${data.result.return_code}`, 'info');
        });
        
        // Socket reconnect issues
        socket.on('connect', () => {
            addToConsole('🔄 রিয়েল-টাইম সংযোগ স্থাপিত হয়েছে', 'success');
        });
        
        socket.on('disconnect', () => {
            addToConsole('⚠️ সংযোগ বিচ্ছিন্ন হয়েছে, পুনরায় সংযোগ হচ্ছে...', 'warning');
        });
        
        // পেজ লোড
        loadFiles();
        updateStats();
        setInterval(updateStats, 3000);
        setInterval(loadFiles, 5000);
        addToConsole('✅ ইফতেখার হোস্টিং বোর্ড অনলাইন', 'success');
        addToConsole('💡 টিপ: ফাইল ম্যানেজার থেকে .py ফাইল আপলোড করে এখানে রান করুন', 'info');
    </script>
</body>
</html>
