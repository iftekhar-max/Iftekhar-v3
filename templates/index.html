<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইফতেখার হোস্টিং - Python কোড রানার</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .cyber-bg {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a2a 100%);
        }
        .glass-card {
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 77, 77, 0.3);
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }
    </style>
</head>
<body class="cyber-bg min-h-screen">
    <div class="container mx-auto px-4 py-16">
        <div class="max-w-md mx-auto">
            <div class="glass-card rounded-2xl p-8 shadow-2xl">
                <div class="text-center mb-8">
                    <i class="fas fa-robot text-6xl text-red-500 animate-pulse"></i>
                    <h1 class="text-3xl font-bold mt-4">
                        <span class="text-red-500 glow-text">ইফতেখার</span>
                        <span class="text-blue-500">হোস্টিং</span>
                    </h1>
                    <p class="text-gray-400 mt-2">Python কোড রানার v2.0</p>
                </div>
                
                <form id="loginForm">
                    <div class="mb-4">
                        <div class="relative">
                            <i class="fas fa-user absolute left-3 top-3 text-red-500"></i>
                            <input type="text" id="username" placeholder="ইউজারনেম" class="w-full pl-10 pr-4 py-3 bg-gray-800 bg-opacity-50 border border-red-500 rounded-lg text-white focus:outline-none focus:border-red-400">
                        </div>
                    </div>
                    <div class="mb-6">
                        <div class="relative">
                            <i class="fas fa-lock absolute left-3 top-3 text-red-500"></i>
                            <input type="password" id="password" placeholder="পাসওয়ার্ড" class="w-full pl-10 pr-4 py-3 bg-gray-800 bg-opacity-50 border border-red-500 rounded-lg text-white focus:outline-none focus:border-red-400">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-red-500 to-blue-500 text-white py-3 rounded-lg font-semibold hover:opacity-90 transition transform hover:scale-105">
                        <i class="fas fa-sign-in-alt"></i> লগইন করুন
                    </button>
                </form>
                
                <div class="text-center mt-6">
                    <a href="/register" class="text-blue-400 hover:text-blue-300">নতুন অ্যাকাউন্ট? রেজিস্ট্রেশন করুন</a>
                </div>
                
                <div id="message" class="mt-4"></div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            
            const data = await response.json();
            if(data.success) {
                window.location.href = '/dashboard';
            } else {
                document.getElementById('message').innerHTML = `<div class="bg-red-500 bg-opacity-20 border border-red-500 text-red-300 p-3 rounded">${data.message}</div>`;
            }
        });
    </script>
</body>
</html>
