<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইফতেখার হোস্টিং বট সার্ভার | লগইন</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a2a 100%);
            overflow-x: hidden;
            position: relative;
        }

        .matrix-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .matrix-rain {
            position: absolute;
            top: -20%;
            color: rgba(255, 77, 77, 0.3);
            font-family: monospace;
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100%);
                opacity: 1;
            }
            100% {
                transform: translateY(1000%);
                opacity: 0;
            }
        }

        .glow-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            animation: floatGlow 10s infinite alternate;
        }

        @keyframes floatGlow {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            100% {
                transform: translate(50px, 50px) scale(1.5);
                opacity: 0.6;
            }
        }

        .orb-1 {
            background: radial-gradient(circle, #ff4d4d, transparent);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            background: radial-gradient(circle, #4d4dff, transparent);
            bottom: -100px;
            right: -100px;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .glass-card {
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(255, 77, 77, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 77, 77, 0.2);
            animation: fadeInUp 0.8s ease;
            transform-style: preserve-3d;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px) rotateX(-10deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .robot-icon {
            font-size: 70px;
            animation: bounce 2s infinite;
            filter: drop-shadow(0 0 20px rgba(255, 77, 77, 0.5));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        .red-text {
            color: #ff4d4d;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }

        .blue-text {
            color: #4d4dff;
            text-shadow: 0 0 10px rgba(77, 77, 255, 0.5);
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
            font-family: 'Orbitron', monospace;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff4d4d;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 77, 77, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #ff4d4d;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        input::placeholder {
            color: #666;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #ff4d4d, #4d4dff);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.5);
        }

        .toggle-link {
            text-align: center;
            margin-top: 25px;
            color: #aaa;
        }

        .toggle-link a {
            color: #ff4d4d;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .toggle-link a:hover {
            text-shadow: 0 0 10px #ff4d4d;
        }

        .alert {
            background: rgba(255, 77, 77, 0.2);
            border-left: 4px solid #ff4d4d;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .terminal-line {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 12px;
            color: #0f0;
            z-index: 1;
            border-left: 2px solid #ff4d4d;
        }

        .typing {
            overflow: hidden;
            white-space: nowrap;
            animation: typing 3s steps(40, end);
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="matrix-bg" id="matrixBg"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="container">
        <div class="glass-card" id="authCard">
            <div class="logo-section">
                <div class="robot-icon">
                    <i class="fas fa-robot"></i>
                </div>
                <h1>
                    <span class="red-text">ইফতেখার</span>
                    <span class="blue-text">হোস্টিং</span>
                </h1>
                <div class="subtitle">বট সার্ভার v2.0</div>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginUsername" placeholder="ইউজারনেম" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> লগইন করুন
                </button>
            </form>

            <div class="toggle-link">
                নতুন ব্যবহারকারী? <a href="#" onclick="toggleForm()">রেজিস্ট্রেশন করুন</a>
            </div>
            <div id="loginMessage"></div>
        </div>
    </div>

    <div class="terminal-line">
        <span class="typing">➜ ইফতেখার বট সার্ভার অনলাইন | স্ট্যাটাস: রেডি</span>
    </div>

    <script>
        function createMatrixRain() {
            const bg = document.getElementById('matrixBg');
            const characters = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン01';
            
            for(let i = 0; i < 50; i++) {
                const rain = document.createElement('div');
                rain.className = 'matrix-rain';
                rain.style.left = Math.random() * 100 + '%';
                rain.style.animationDuration = Math.random() * 5 + 3 + 's';
                rain.style.animationDelay = Math.random() * 5 + 's';
                rain.style.opacity = Math.random() * 0.5;
                rain.innerHTML = characters.charAt(Math.floor(Math.random() * characters.length));
                bg.appendChild(rain);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();

                if(data.success) {
                    localStorage.setItem('currentUser', JSON.stringify({username, password}));
                    showMessage('লগইন সফল! ড্যাশবোর্ডে নিয়ে যাচ্ছি...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showMessage(data.message || 'ইউজারনেম বা পাসওয়ার্ড ভুল!', 'error');
                }
            } catch(err) {
                showMessage('সার্ভারে সংযোগ করতে ব্যর্থ!', 'error');
            }
        });

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('loginMessage');
            messageDiv.innerHTML = `<div class="alert" style="border-left-color: ${type === 'success' ? '#00ff00' : '#ff4d4d'}">${msg}</div>`;
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 3000);
        }

        function toggleForm() {
            window.location.href = '/register';
        }

        createMatrixRain();
    </script>
</body>
</html>
