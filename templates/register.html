<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রেজিস্ট্রেশন - ইফতেখার হোস্টিং</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a2a 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(77, 77, 255, 0.3);
            border-radius: 30px;
        }
        
        .cyber-grid {
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 77, 77, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(77, 77, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        .glow-text {
            text-shadow: 0 0 10px rgba(77, 77, 255, 0.5);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        
        .bg-orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        
        .orb-1 {
            background: radial-gradient(circle, #ff4d4d, transparent);
            top: -100px;
            left: -100px;
            animation: pulse 4s ease-in-out infinite;
        }
        
        .orb-2 {
            background: radial-gradient(circle, #4d4dff, transparent);
            bottom: -100px;
            right: -100px;
            animation: pulse 4s ease-in-out infinite 2s;
        }
        
        .input-focus:focus {
            box-shadow: 0 0 15px rgba(77, 77, 255, 0.3);
            border-color: #4d4dff !important;
        }
        
        .btn-gradient {
            background: linear-gradient(90deg, #4d4dff, #ff4d4d);
            transition: all 0.3s ease;
        }
        
        .btn-gradient:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(77, 77, 255, 0.5);
        }
        
        .password-strength {
            height: 4px;
            transition: all 0.3s ease;
        }
        
        .requirement-item {
            transition: all 0.3s ease;
        }
        
        .requirement-item.valid {
            color: #00ff00;
        }
        
        .requirement-item.invalid {
            color: #ff4444;
        }
    </style>
</head>
<body class="text-white">
    <div class="cyber-grid"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    
    <div class="container mx-auto px-4 py-8 min-h-screen flex items-center justify-center relative z-10">
        <div class="glass-card p-8 max-w-md w-full">
            <!-- লোগো ও হেডার -->
            <div class="text-center mb-8">
                <div class="float-animation">
                    <i class="fas fa-microchip text-6xl text-blue-500"></i>
                </div>
                <h1 class="text-3xl font-bold mt-4">
                    <span class="text-red-500">ইফতেখার</span>
                    <span class="text-blue-500 glow-text">হোস্টিং</span>
                </h1>
                <p class="text-gray-400 mt-2">নতুন অ্যাকাউন্ট তৈরি করুন</p>
            </div>
            
            <!-- রেজিস্ট্রেশন ফর্ম -->
            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-300">
                        <i class="fas fa-user text-blue-500 mr-2"></i>ইউজারনেম
                    </label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-3 text-gray-500"></i>
                        <input type="text" id="username" 
                               class="w-full pl-10 pr-4 py-3 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-lg focus:outline-none input-focus transition"
                               placeholder="আপনার ইউজারনেম দিন" required>
                    </div>
                    <p id="usernameError" class="text-xs text-red-500 mt-1 hidden"></p>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-300">
                        <i class="fas fa-envelope text-blue-500 mr-2"></i>ইমেইল
                    </label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-3 top-3 text-gray-500"></i>
                        <input type="email" id="email" 
                               class="w-full pl-10 pr-4 py-3 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-lg focus:outline-none input-focus transition"
                               placeholder="আপনার ইমেইল ঠিকানা" required>
                    </div>
                    <p id="emailError" class="text-xs text-red-500 mt-1 hidden"></p>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-300">
                        <i class="fas fa-lock text-blue-500 mr-2"></i>পাসওয়ার্ড
                    </label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-3 text-gray-500"></i>
                        <input type="password" id="password" 
                               class="w-full pl-10 pr-4 py-3 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-lg focus:outline-none input-focus transition"
                               placeholder="পাসওয়ার্ড দিন" required>
                        <button type="button" onclick="togglePassword('password')" class="absolute right-3 top-3 text-gray-500 hover:text-gray-300">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    
                    <!-- পাসওয়ার্ড স্ট্রেন্থ ইন্ডিকেটর -->
                    <div class="mt-2">
                        <div class="password-strength w-full bg-gray-700 rounded-full overflow-hidden">
                            <div id="strengthBar" class="h-full transition-all duration-300" style="width: 0%; background: #ff4444;"></div>
                        </div>
                        <p id="strengthText" class="text-xs mt-1 text-gray-400">পাসওয়ার্ড শক্তি: খুবই দুর্বল</p>
                    </div>
                    
                    <!-- পাসওয়ার্ড রিকোয়ারমেন্ট -->
                    <div class="mt-2 space-y-1 text-xs">
                        <p id="reqLength" class="requirement-item text-gray-400">
                            <i class="fas fa-circle mr-1" style="font-size: 6px;"></i> কমপক্ষে ৬ অক্ষর
                        </p>
                        <p id="reqUpper" class="requirement-item text-gray-400">
                            <i class="fas fa-circle mr-1" style="font-size: 6px;"></i> অন্তত একটি বড় হাতের অক্ষর (A-Z)
                        </p>
                        <p id="reqNumber" class="requirement-item text-gray-400">
                            <i class="fas fa-circle mr-1" style="font-size: 6px;"></i> অন্তত একটি সংখ্যা (0-9)
                        </p>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-300">
                        <i class="fas fa-check-circle text-blue-500 mr-2"></i>পাসওয়ার্ড নিশ্চিত করুন
                    </label>
                    <div class="relative">
                        <i class="fas fa-check-circle absolute left-3 top-3 text-gray-500"></i>
                        <input type="password" id="confirmPassword" 
                               class="w-full pl-10 pr-4 py-3 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-lg focus:outline-none input-focus transition"
                               placeholder="পাসওয়ার্ড আবার দিন" required>
                    </div>
                    <p id="matchError" class="text-xs text-red-500 mt-1 hidden"></p>
                </div>
                
                <div class="flex items-center gap-2 mt-4">
                    <input type="checkbox" id="terms" class="w-4 h-4 rounded border-gray-700 bg-gray-800">
                    <label for="terms" class="text-sm text-gray-400">
                        আমি <a href="#" class="text-blue-500 hover:underline">টার্মস এন্ড কন্ডিশন</a> মেনে নিচ্ছি
                    </label>
                </div>
                
                <button type="submit" id="submitBtn" 
                        class="btn-gradient w-full py-3 rounded-lg font-semibold text-white transition disabled:opacity-50 disabled:cursor-not-allowed"
                        disabled>
                    <i class="fas fa-user-plus mr-2"></i>রেজিস্ট্রেশন করুন
                </button>
            </form>
            
            <!-- লগইন লিংক -->
            <div class="text-center mt-6">
                <p class="text-gray-400">
                    ইতিমধ্যে অ্যাকাউন্ট আছে? 
                    <a href="/" class="text-blue-500 hover:text-blue-400 font-semibold transition">
                        লগইন করুন
                    </a>
                </p>
            </div>
            
            <!-- মেসেজ কন্টেইনার -->
            <div id="messageContainer" class="mt-4"></div>
        </div>
    </div>
    
    <script>
        let strengthInterval = null;
        
        // পাসওয়ার্ড টগল ফাংশন
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = field.nextElementSibling.querySelector('i');
            
            if(field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        // পাসওয়ার্ড শক্তি চেক করা
        function checkPasswordStrength(password) {
            let strength = 0;
            let requirements = {
                length: false,
                upper: false,
                number: false
            };
            
            // লেন্থ চেক
            if(password.length >= 6) {
                strength += 1;
                requirements.length = true;
                document.getElementById('reqLength').classList.add('valid');
                document.getElementById('reqLength').classList.remove('invalid');
                document.getElementById('reqLength').innerHTML = '<i class="fas fa-check-circle mr-1"></i> কমপক্ষে ৬ অক্ষর ✓';
            } else {
                document.getElementById('reqLength').classList.add('invalid');
                document.getElementById('reqLength').classList.remove('valid');
                document.getElementById('reqLength').innerHTML = '<i class="fas fa-circle mr-1" style="font-size: 6px;"></i> কমপক্ষে ৬ অক্ষর';
            }
            
            // আপারকেস চেক
            if(/[A-Z]/.test(password)) {
                strength += 1;
                requirements.upper = true;
                document.getElementById('reqUpper').classList.add('valid');
                document.getElementById('reqUpper').classList.remove('invalid');
                document.getElementById('reqUpper').innerHTML = '<i class="fas fa-check-circle mr-1"></i> অন্তত একটি বড় হাতের অক্ষর (A-Z) ✓';
            } else {
                document.getElementById('reqUpper').classList.add('invalid');
                document.getElementById('reqUpper').classList.remove('valid');
                document.getElementById('reqUpper').innerHTML = '<i class="fas fa-circle mr-1" style="font-size: 6px;"></i> অন্তত একটি বড় হাতের অক্ষর (A-Z)';
            }
            
            // নাম্বার চেক
            if(/[0-9]/.test(password)) {
                strength += 1;
                requirements.number = true;
                document.getElementById('reqNumber').classList.add('valid');
                document.getElementById('reqNumber').classList.remove('invalid');
                document.getElementById('reqNumber').innerHTML = '<i class="fas fa-check-circle mr-1"></i> অন্তত একটি সংখ্যা (0-9) ✓';
            } else {
                document.getElementById('reqNumber').classList.add('invalid');
                document.getElementById('reqNumber').classList.remove('valid');
                document.getElementById('reqNumber').innerHTML = '<i class="fas fa-circle mr-1" style="font-size: 6px;"></i> অন্তত একটি সংখ্যা (0-9)';
            }
            
            // স্পেশাল ক্যারেক্টার চেক (অপশনাল)
            if(/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                strength += 0.5;
            }
            
            // স্ট্রেন্থ বার আপডেট
            const strengthPercent = (strength / 3) * 100;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            strengthBar.style.width = strengthPercent + '%';
            
            if(strengthPercent <= 33) {
                strengthBar.style.background = '#ff4444';
                strengthText.textContent = 'পাসওয়ার্ড শক্তি: খুবই দুর্বল';
                strengthText.style.color = '#ff4444';
            } else if(strengthPercent <= 66) {
                strengthBar.style.background = '#ffaa00';
                strengthText.textContent = 'পাসওয়ার্ড শক্তি: মধ্যম';
                strengthText.style.color = '#ffaa00';
            } else {
                strengthBar.style.background = '#00ff00';
                strengthText.textContent = 'পাসওয়ার্ড শক্তি: শক্তিশালী';
                strengthText.style.color = '#00ff00';
            }
            
            return requirements.length && requirements.upper && requirements.number;
        }
        
        // পাসওয়ার্ড ম্যাচ চেক
        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const matchError = document.getElementById('matchError');
            
            if(confirm && password !== confirm) {
                matchError.textContent = 'পাসওয়ার্ড দুটি মিলছে না!';
                matchError.classList.remove('hidden');
                return false;
            } else {
                matchError.classList.add('hidden');
                return true;
            }
        }
        
        // ফর্ম ভ্যালিডেশন
        function validateForm() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const terms = document.getElementById('terms').checked;
            const isPasswordStrong = checkPasswordStrength(password);
            const isPasswordMatch = checkPasswordMatch();
            
            let isValid = true;
            
            // ইউজারনেম ভ্যালিডেশন
            if(username.length < 3) {
                document.getElementById('usernameError').textContent = 'ইউজারনেম কমপক্ষে ৩ অক্ষরের হতে হবে';
                document.getElementById('usernameError').classList.remove('hidden');
                isValid = false;
            } else if(!/^[a-zA-Z0-9_]+$/.test(username)) {
                document.getElementById('usernameError').textContent = 'ইউজারনেমে শুধু ইংরেজি অক্ষর, সংখ্যা এবং আন্ডারস্কোর ব্যবহার করুন';
                document.getElementById('usernameError').classList.remove('hidden');
                isValid = false;
            } else {
                document.getElementById('usernameError').classList.add('hidden');
            }
            
            // ইমেইল ভ্যালিডেশন
            if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('emailError').textContent = 'সঠিক ইমেইল ঠিকানা দিন';
                document.getElementById('emailError').classList.remove('hidden');
                isValid = false;
            } else {
                document.getElementById('emailError').classList.add('hidden');
            }
            
            if(!isPasswordStrong) isValid = false;
            if(!isPasswordMatch) isValid = false;
            if(!terms) isValid = false;
            
            document.getElementById('submitBtn').disabled = !isValid;
            return isValid;
        }
        
        // শো মেসেজ ফাংশন
        function showMessage(message, type = 'error') {
            const container = document.getElementById('messageContainer');
            const colors = {
                success: 'bg-green-500 bg-opacity-20 border-green-500 text-green-300',
                error: 'bg-red-500 bg-opacity-20 border-red-500 text-red-300',
                info: 'bg-blue-500 bg-opacity-20 border-blue-500 text-blue-300'
            };
            
            container.innerHTML = `
                <div class="${colors[type]} border rounded-lg p-3 text-center animate-pulse">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2"></i>
                    ${message}
                </div>
            `;
            
            setTimeout(() => {
                container.innerHTML = '';
            }, 3000);
        }
        
        // রেজিস্ট্রেশন সাবমিট
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>প্রসেসিং...';
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password, email })
                });
                
                const data = await response.json();
                
                if(data.success) {
                    showMessage(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showMessage(data.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-user-plus mr-2"></i>রেজিস্ট্রেশন করুন';
                }
            } catch (error) {
                showMessage('সার্ভার এরর! পরে আবার চেষ্টা করুন।', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus mr-2"></i>রেজিস্ট্রেশন করুন';
            }
        });
        
        // ইভেন্ট লিসেনার
        document.getElementById('username').addEventListener('input', validateForm);
        document.getElementById('email').addEventListener('input', validateForm);
        document.getElementById('password').addEventListener('input', () => {
            checkPasswordStrength(document.getElementById('password').value);
            checkPasswordMatch();
            validateForm();
        });
        document.getElementById('confirmPassword').addEventListener('input', () => {
            checkPasswordMatch();
            validateForm();
        });
        document.getElementById('terms').addEventListener('change', validateForm);
        
        // পেজ লোড হলে
        document.addEventListener('DOMContentLoaded', () => {
            // র‍্যান্ডম সাইবার গ্রিড এনিমেশন
            setInterval(() => {
                const grid = document.querySelector('.cyber-grid');
                if(grid) {
                    grid.style.backgroundPosition = ` ${Math.random() * 50}px ${Math.random() * 50}px`;
                }
            }, 5000);
        });
    </script>
</body>
</html>
